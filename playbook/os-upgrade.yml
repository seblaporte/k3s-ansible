---

# Rolling OS upgrade for k3s cluster nodes.
# Agents are upgraded one at a time (serial: 1) with drain/uncordon to avoid downtime.
# Server is upgraded last — no drain possible (single control plane), brief API unavailability expected.
#
# Boot architecture: nodes boot via NFS (/boot) + iSCSI root from Synology NAS.
# /boot/firmware is a bind mount of /boot so kernel packages can write their files
# to the NFS share directly. iSCSI modules are included automatically in initramfs
# because /etc/iscsi/iscsi.initramfs exists on each node.
#
# Run with: ansible-playbook playbook/os-upgrade.yml -i inventory.yml
# To upgrade agents only: ansible-playbook playbook/os-upgrade.yml -i inventory.yml --limit agent
# To upgrade server only: ansible-playbook playbook/os-upgrade.yml -i inventory.yml --limit server

- name: Upgrade OS on cluster agents (rolling, one at a time)
  hosts: agent
  become: true
  gather_facts: true
  serial: 1
  tasks:
    - name: Ensure /boot/firmware mount point exists in NFS share
      ansible.builtin.file:
        path: /boot/firmware
        state: directory
        mode: "0755"

    - name: Ensure /boot/firmware bind mount is in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/boot    /boot/firmware    none    bind,_netdev    0 0"
        regexp: "^/boot\\s+/boot/firmware"
        state: present

    - name: Mount /boot/firmware bind mount if not already mounted
      ansible.builtin.command: mount /boot/firmware
      register: mount_result
      failed_when: mount_result.rc != 0 and 'already mounted' not in mount_result.stderr
      changed_when: mount_result.rc == 0

    - name: Unhold kernel and firmware packages (clean up any holds from previous runs)
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop:
        - linux-image-rpi-v8
        - linux-image-rpi-2712
        - linux-headers-rpi-v8
        - linux-headers-rpi-2712
        - raspi-firmware
        - raspi-config
        - linux-libc-dev

    - name: Ensure kernel metapackages are installed (may have been removed on previous failed run)
      ansible.builtin.apt:
        name:
          - linux-image-rpi-v8
          - linux-headers-rpi-v8
          - raspi-firmware
        state: present
        update_cache: true

    - name: Cordon node
      ansible.builtin.command: kubectl cordon {{ ansible_hostname }}
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Drain node
      ansible.builtin.command: >
        kubectl drain {{ ansible_hostname }}
        --ignore-daemonsets
        --delete-emptydir-data
        --disable-eviction
        --timeout=120s
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Mark open-iscsi as manually installed to prevent autoremove from breaking iSCSI initramfs
      ansible.builtin.command: apt-mark manual open-iscsi
      changed_when: false

    - name: Ensure /etc/iscsi/iscsi.initramfs exists (triggers iSCSI inclusion in initramfs on kernel install)
      ansible.builtin.file:
        path: /etc/iscsi/iscsi.initramfs
        state: touch
        mode: "0644"
        modification_time: preserve
        access_time: preserve

    - name: Save /boot/cmdline.txt before upgrade (raspi-firmware may replace it with a redirect placeholder)
      ansible.builtin.slurp:
        src: /boot/cmdline.txt
      register: cmdline_backup

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        autoclean: true

    - name: Check if /boot/cmdline.txt was replaced with a redirect placeholder by raspi-firmware
      ansible.builtin.shell: grep -q 'DO NOT EDIT' /boot/cmdline.txt && echo replaced || echo ok
      register: cmdline_state
      changed_when: false
      failed_when: false

    - name: Restore /boot/cmdline.txt if replaced with redirect placeholder
      ansible.builtin.copy:
        content: "{{ cmdline_backup.content | b64decode }}"
        dest: /boot/cmdline.txt
        mode: "0755"
      when: cmdline_state.stdout == 'replaced'

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Check if any kernel image was updated since last boot (handles Pi 4 kernel8.img and Pi 5 kernel_2712.img)
      ansible.builtin.shell: |
        boot_time=$(date -d "$(uptime -s)" +%s)
        max_kernel_mtime=$(stat -c %Y /boot/kernel*.img 2>/dev/null | sort -n | tail -1)
        [ "${max_kernel_mtime:-0}" -gt "$boot_time" ] && echo "reboot_needed" || echo "up_to_date"
      register: rpi_kernel_check
      changed_when: false

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: reboot_required_file.stat.exists or 'reboot_needed' in rpi_kernel_check.stdout

    - name: Uncordon node
      ansible.builtin.command: kubectl uncordon {{ ansible_hostname }}
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Wait for pods to stabilize after uncordon
      ansible.builtin.pause:
        seconds: 60

- name: Upgrade OS on cluster server (last — single control plane, brief API downtime during reboot)
  hosts: server
  become: true
  gather_facts: true
  serial: 1
  tasks:
    - name: Ensure /boot/firmware mount point exists in NFS share
      ansible.builtin.file:
        path: /boot/firmware
        state: directory
        mode: "0755"

    - name: Ensure /boot/firmware bind mount is in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/boot    /boot/firmware    none    bind,_netdev    0 0"
        regexp: "^/boot\\s+/boot/firmware"
        state: present

    - name: Mount /boot/firmware bind mount if not already mounted
      ansible.builtin.command: mount /boot/firmware
      register: mount_result
      failed_when: mount_result.rc != 0 and 'already mounted' not in mount_result.stderr
      changed_when: mount_result.rc == 0

    - name: Unhold kernel and firmware packages (clean up any holds from previous runs)
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop:
        - linux-image-rpi-v8
        - linux-image-rpi-2712
        - linux-headers-rpi-v8
        - linux-headers-rpi-2712
        - raspi-firmware
        - raspi-config
        - linux-libc-dev

    - name: Ensure kernel metapackages are installed
      ansible.builtin.apt:
        name:
          - linux-image-rpi-v8
          - linux-headers-rpi-v8
          - raspi-firmware
        state: present
        update_cache: true

    - name: Mark open-iscsi as manually installed to prevent autoremove from breaking iSCSI initramfs
      ansible.builtin.command: apt-mark manual open-iscsi
      changed_when: false

    - name: Ensure /etc/iscsi/iscsi.initramfs exists (triggers iSCSI inclusion in initramfs on kernel install)
      ansible.builtin.file:
        path: /etc/iscsi/iscsi.initramfs
        state: touch
        mode: "0644"
        modification_time: preserve
        access_time: preserve

    - name: Save /boot/cmdline.txt before upgrade (raspi-firmware may replace it with a redirect placeholder)
      ansible.builtin.slurp:
        src: /boot/cmdline.txt
      register: cmdline_backup

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        autoclean: true

    - name: Check if /boot/cmdline.txt was replaced with a redirect placeholder by raspi-firmware
      ansible.builtin.shell: grep -q 'DO NOT EDIT' /boot/cmdline.txt && echo replaced || echo ok
      register: cmdline_state
      changed_when: false
      failed_when: false

    - name: Restore /boot/cmdline.txt if replaced with redirect placeholder
      ansible.builtin.copy:
        content: "{{ cmdline_backup.content | b64decode }}"
        dest: /boot/cmdline.txt
        mode: "0755"
      when: cmdline_state.stdout == 'replaced'

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Check if any kernel image was updated since last boot (handles Pi 4 kernel8.img and Pi 5 kernel_2712.img)
      ansible.builtin.shell: |
        boot_time=$(date -d "$(uptime -s)" +%s)
        max_kernel_mtime=$(stat -c %Y /boot/kernel*.img 2>/dev/null | sort -n | tail -1)
        [ "${max_kernel_mtime:-0}" -gt "$boot_time" ] && echo "reboot_needed" || echo "up_to_date"
      register: rpi_kernel_check
      changed_when: false

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 600
        test_command: kubectl get nodes
      when: reboot_required_file.stat.exists or 'reboot_needed' in rpi_kernel_check.stdout
